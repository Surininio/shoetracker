<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>My Shoe Collection</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#b5502e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shoes">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<style>
  :root {
    --bg: #f4f3f1;
    --card: #ffffff;
    --text: #1c1b1a;
    --muted: #6b6863;
    --accent: #b5502e;
    --accent-text: #ffffff;
    --border: #e5e2dd;
    --danger: #b3261e;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #171615;
      --card: #232220;
      --text: #f2f0ed;
      --muted: #a39e97;
      --accent: #d9764f;
      --accent-text: #1c1b1a;
      --border: #34322f;
      --danger: #ff6b60;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding-bottom: 100px;
  }
  header {
    position: sticky;
    top: 0;
    background: var(--bg);
    padding: 20px 16px 12px;
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }
  h1 {
    font-size: 22px;
    margin: 0 0 4px;
  }
  .title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .title-left {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
  }
  .title-left h1 { margin: 0; }
  .title-left .icon-btn {
    font-size: 15px;
    padding: 4px;
  }
  .user-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .user-email {
    font-size: 12px;
    color: var(--muted);
    max-width: 120px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #titleInput {
    font-size: 22px;
    font-weight: 700;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2px 6px;
    width: 100%;
  }
  .stats {
    display: flex;
    gap: 16px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    flex: 1;
    min-width: 90px;
  }
  .stat .num {
    font-size: 20px;
    font-weight: 700;
  }
  .stat .label {
    font-size: 12px;
    color: var(--muted);
  }
  .controls-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .search {
    flex: 1;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 15px;
  }
  .sort-select {
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 14px;
  }
  .archive-toggle-row {
    margin-top: 10px;
  }
  .link-btn {
    background: none;
    border: none;
    padding: 0;
    font-size: 13px;
    color: var(--muted);
    text-decoration: underline;
    cursor: pointer;
  }
  main {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .section-heading {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin: 8px 0 -2px;
  }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card.donated { opacity: 0.7; }
  .card-top {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .card-wear {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--muted);
    gap: 8px;
    flex-wrap: wrap;
  }
  .thumb {
    width: 64px;
    height: 64px;
    border-radius: 10px;
    object-fit: cover;
    background: var(--bg);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-info .name {
    font-weight: 600;
    font-size: 16px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-info .meta {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }
  .card-actions {
    display: flex;
    gap: 6px;
  }
  .icon-btn {
    background: none;
    border: none;
    font-size: 18px;
    padding: 6px;
    cursor: pointer;
    color: var(--muted);
  }
  .wear-btn, .small-btn {
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 8px;
    color: var(--text);
    background: none;
    cursor: pointer;
  }
  .small-btn-row {
    display: flex;
    gap: 6px;
  }
  .donate-btn {
    color: var(--accent);
    border-color: var(--accent);
  }
  .fab {
    position: fixed;
    right: 20px;
    bottom: 24px;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--accent-text);
    border: none;
    font-size: 28px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    cursor: pointer;
    z-index: 20;
  }
  .sheet-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    z-index: 30;
  }
  .sheet-backdrop.open { display: block; }
  .sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: var(--card);
    border-radius: 18px 18px 0 0;
    padding: 20px 16px calc(20px + env(safe-area-inset-bottom));
    transform: translateY(100%);
    transition: transform 0.25s ease;
    z-index: 31;
    max-height: 88vh;
    overflow-y: auto;
  }
  .sheet.open { transform: translateY(0); }
  .sheet h2 {
    margin: 0 0 14px;
    font-size: 18px;
  }
  .field {
    margin-bottom: 12px;
  }
  .field label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .field input, .field select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
  }
  .photo-picker {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .photo-preview {
    width: 64px;
    height: 64px;
    border-radius: 10px;
    background: var(--bg);
    border: 1px dashed var(--border);
    object-fit: cover;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: var(--muted);
  }
  .row2 {
    display: flex;
    gap: 10px;
  }
  .row2 .field { flex: 1; }
  .sheet-buttons {
    display: flex;
    gap: 10px;
    margin-top: 6px;
  }
  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--accent-text);
  }
  .btn-secondary {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-danger {
    background: none;
    color: var(--danger);
    border: 1px solid var(--danger);
  }

  /* Auth screen */
  .auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .auth-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 380px;
  }
  .auth-card h1 {
    font-size: 20px;
    margin-bottom: 6px;
  }
  .auth-card p {
    font-size: 13px;
    color: var(--muted);
    margin: 0 0 18px;
  }
  .auth-divider {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin: 16px 0;
  }
  .auth-error {
    color: var(--danger);
    font-size: 13px;
    margin-top: 10px;
    min-height: 16px;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <h1 id="authTitle">My Shoe Collection</h1>
    <p>Sign in to create and keep track of your own shoe collection, synced across your devices.</p>
    <button type="button" class="btn btn-primary" id="googleSignInBtn" style="width:100%;">Continue with Google</button>
    <div class="auth-divider">or use email</div>
    <div class="field">
      <label for="authEmail">Email</label>
      <input id="authEmail" type="email" autocomplete="email">
    </div>
    <div class="field">
      <label for="authPassword">Password</label>
      <input id="authPassword" type="password" autocomplete="current-password" minlength="6">
    </div>
    <div class="sheet-buttons">
      <button type="button" class="btn btn-secondary" id="authSignInBtn">Sign In</button>
      <button type="button" class="btn btn-primary" id="authSignUpBtn">Sign Up</button>
    </div>
    <button type="button" class="link-btn" id="forgotPasswordBtn" style="margin-top:12px;">Forgot password?</button>
    <div class="auth-error" id="authError"></div>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <div class="title-row">
      <div class="title-left">
        <h1 id="appTitle">My Shoe Collection</h1>
        <button class="icon-btn" id="editTitleBtn" aria-label="Rename collection">✏️</button>
      </div>
      <div class="user-chip">
        <span class="user-email" id="userEmail"></span>
        <button class="link-btn" id="signOutBtn">Sign out</button>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="num" id="statTotal">0</div><div class="label">Pairs</div></div>
      <div class="stat"><div class="num" id="statBrands">0</div><div class="label">Brands</div></div>
      <div class="stat"><div class="num" id="statWears">0</div><div class="label">Total Wears</div></div>
      <div class="stat"><div class="num" id="statSpent">$0</div><div class="label">Total Spent</div></div>
    </div>
    <div class="controls-row">
      <input class="search" id="search" type="search" placeholder="Search by name, brand, or color...">
      <select class="sort-select" id="sortSelect">
        <option value="recent">Recently Added</option>
        <option value="name">Name (A-Z)</option>
        <option value="brand">Brand (A-Z)</option>
        <option value="wears">Most Worn</option>
      </select>
    </div>
    <div class="archive-toggle-row">
      <button type="button" class="link-btn" id="toggleDonatedBtn">Show donated (0)</button>
    </div>
  </header>

  <main id="list"></main>

  <div class="empty" id="emptyState" style="display:none;">
    No shoes yet. Tap + to add your first pair.
  </div>

  <button class="fab" id="addBtn" aria-label="Add shoe">+</button>

  <div class="sheet-backdrop" id="backdrop"></div>
  <div class="sheet" id="sheet">
    <h2 id="sheetTitle">Add Shoe</h2>
    <form id="shoeForm">
      <div class="photo-picker">
        <img class="photo-preview" id="photoPreview">
        <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none;">
        <button type="button" class="btn btn-secondary" id="photoBtn" style="flex:none; padding:10px 14px;">Choose Photo</button>
      </div>
      <div class="field">
        <label for="fName">Name</label>
        <input id="fName" required placeholder="e.g. Air Max 90">
      </div>
      <div class="row2">
        <div class="field">
          <label for="fBrand">Brand</label>
          <input id="fBrand" placeholder="e.g. Nike">
        </div>
        <div class="field">
          <label for="fSize">Size</label>
          <input id="fSize" placeholder="e.g. 10.5">
        </div>
      </div>
      <div class="field">
        <label for="fColor">Color</label>
        <input id="fColor" placeholder="e.g. White/Red">
      </div>
      <div class="row2">
        <div class="field">
          <label for="fTimesWorn">Times Worn</label>
          <input id="fTimesWorn" type="number" min="0" inputmode="numeric" placeholder="0">
        </div>
        <div class="field">
          <label for="fPrice">Price Paid ($)</label>
          <input id="fPrice" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0.00">
        </div>
      </div>
      <input type="hidden" id="fId">
      <input type="hidden" id="fPhotoData">
      <div class="sheet-buttons">
        <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup,
  createUserWithEmailAndPassword, signInWithEmailAndPassword,
  onAuthStateChanged, signOut, sendPasswordResetEmail,
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, doc, addDoc, updateDoc, deleteDoc,
  onSnapshot, setDoc, getDoc, serverTimestamp, increment,
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Replace with the config from Firebase console > Project settings > Your apps.
const firebaseConfig = {
  apiKey: "AIzaSyAiaovBsiiXkrCtxsw-1j8iImqPTyCm-64",
  authDomain: "shoetracker-rik.firebaseapp.com",
  projectId: "shoetracker-rik",
  storageBucket: "shoetracker-rik.firebasestorage.app",
  messagingSenderId: "134738375295",
  appId: "1:134738375295:web:f7992977fdd1e44edc454a",
};

const firebaseApp = initializeApp(firebaseConfig);
const auth = getAuth(firebaseApp);
const db = getFirestore(firebaseApp);
const googleProvider = new GoogleAuthProvider();

const DEFAULT_TITLE = 'My Shoe Collection';
let shoes = [];
let editingId = null;
let currentUser = null;
let unsubscribeShoes = null;
let unsubscribeProfile = null;
let showDonated = false;

const authScreen = document.getElementById('authScreen');
const appEl = document.getElementById('app');
const authEmailInput = document.getElementById('authEmail');
const authPasswordInput = document.getElementById('authPassword');
const authError = document.getElementById('authError');

const listEl = document.getElementById('list');
const emptyState = document.getElementById('emptyState');
const searchEl = document.getElementById('search');
const sortSelect = document.getElementById('sortSelect');
const toggleDonatedBtn = document.getElementById('toggleDonatedBtn');
const sheet = document.getElementById('sheet');
const backdrop = document.getElementById('backdrop');
const form = document.getElementById('shoeForm');
const photoInput = document.getElementById('photoInput');
const photoPreview = document.getElementById('photoPreview');
const fPhotoData = document.getElementById('fPhotoData');
const appTitleEl = document.getElementById('appTitle');
const editTitleBtn = document.getElementById('editTitleBtn');
const userEmailEl = document.getElementById('userEmail');

function setAuthError(msg) {
  authError.textContent = msg || '';
}

document.getElementById('googleSignInBtn').addEventListener('click', async () => {
  setAuthError('');
  try {
    await signInWithPopup(auth, googleProvider);
  } catch (err) {
    setAuthError(err.message);
  }
});

document.getElementById('authSignInBtn').addEventListener('click', async () => {
  setAuthError('');
  try {
    await signInWithEmailAndPassword(auth, authEmailInput.value.trim(), authPasswordInput.value);
  } catch (err) {
    setAuthError(err.message);
  }
});

document.getElementById('authSignUpBtn').addEventListener('click', async () => {
  setAuthError('');
  try {
    await createUserWithEmailAndPassword(auth, authEmailInput.value.trim(), authPasswordInput.value);
  } catch (err) {
    setAuthError(err.message);
  }
});

document.getElementById('forgotPasswordBtn').addEventListener('click', async () => {
  setAuthError('');
  const email = authEmailInput.value.trim();
  if (!email) {
    setAuthError('Enter your email above first, then tap "Forgot password?" again.');
    return;
  }
  try {
    await sendPasswordResetEmail(auth, email);
    setAuthError('Password reset email sent.');
  } catch (err) {
    setAuthError(err.message);
  }
});

document.getElementById('signOutBtn').addEventListener('click', () => signOut(auth));

onAuthStateChanged(auth, user => {
  currentUser = user;
  if (unsubscribeShoes) { unsubscribeShoes(); unsubscribeShoes = null; }
  if (unsubscribeProfile) { unsubscribeProfile(); unsubscribeProfile = null; }

  if (user) {
    authScreen.classList.add('hidden');
    appEl.classList.remove('hidden');
    userEmailEl.textContent = user.email || '';
    subscribeToUserData(user.uid);
  } else {
    appEl.classList.add('hidden');
    authScreen.classList.remove('hidden');
    shoes = [];
    authEmailInput.value = '';
    authPasswordInput.value = '';
    setAuthError('');
  }
});

function subscribeToUserData(uid) {
  const profileRef = doc(db, 'users', uid);
  unsubscribeProfile = onSnapshot(profileRef, snap => {
    const title = snap.exists() && snap.data().title ? snap.data().title : DEFAULT_TITLE;
    applyTitle(title);
  });

  const shoesRef = collection(db, 'users', uid, 'shoes');
  unsubscribeShoes = onSnapshot(shoesRef, snap => {
    shoes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });
}

function applyTitle(title) {
  appTitleEl.textContent = title;
  document.title = title;
}

editTitleBtn.addEventListener('click', () => {
  const input = document.createElement('input');
  input.id = 'titleInput';
  input.value = appTitleEl.textContent;
  input.maxLength = 40;
  appTitleEl.replaceWith(input);
  editTitleBtn.style.visibility = 'hidden';
  input.focus();
  input.select();

  function commit() {
    const value = input.value.trim() || DEFAULT_TITLE;
    applyTitle(value);
    input.replaceWith(appTitleEl);
    editTitleBtn.style.visibility = 'visible';
    if (currentUser) {
      setDoc(doc(db, 'users', currentUser.uid), { title: value }, { merge: true });
    }
  }

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
  });
});

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function sortShoes(list, mode) {
  const copy = list.slice();
  if (mode === 'name') {
    copy.sort((a, b) => a.name.localeCompare(b.name));
  } else if (mode === 'brand') {
    copy.sort((a, b) => (a.brand || '').localeCompare(b.brand || ''));
  } else if (mode === 'wears') {
    copy.sort((a, b) => (parseInt(b.timesWorn) || 0) - (parseInt(a.timesWorn) || 0));
  } else {
    copy.sort((a, b) => (b.createdAtMs || 0) - (a.createdAtMs || 0));
  }
  return copy;
}

function render() {
  const query = searchEl.value.trim().toLowerCase();
  const active = shoes.filter(s => s.status !== 'donated');
  const donated = shoes.filter(s => s.status === 'donated');

  const matches = s =>
    !query ||
    s.name.toLowerCase().includes(query) ||
    (s.brand || '').toLowerCase().includes(query) ||
    (s.color || '').toLowerCase().includes(query);

  document.getElementById('statTotal').textContent = active.length;
  document.getElementById('statBrands').textContent = new Set(active.map(s => s.brand).filter(Boolean)).size;
  document.getElementById('statWears').textContent = active.reduce((sum, s) => sum + (parseInt(s.timesWorn) || 0), 0);
  const totalSpent = active.reduce((sum, s) => sum + (parseFloat(s.price) || 0), 0);
  document.getElementById('statSpent').textContent = '$' + totalSpent.toFixed(totalSpent % 1 === 0 ? 0 : 2);
  toggleDonatedBtn.textContent = `${showDonated ? 'Hide' : 'Show'} donated (${donated.length})`;

  const activeFiltered = sortShoes(active.filter(matches), sortSelect.value);
  const donatedFiltered = sortShoes(donated.filter(matches), sortSelect.value);

  listEl.innerHTML = '';
  emptyState.style.display = shoes.length === 0 ? 'block' : 'none';

  activeFiltered.forEach(s => listEl.appendChild(renderCard(s, false)));

  if (showDonated && donatedFiltered.length) {
    const heading = document.createElement('div');
    heading.className = 'section-heading';
    heading.textContent = 'Donated';
    listEl.appendChild(heading);
    donatedFiltered.forEach(s => listEl.appendChild(renderCard(s, true)));
  }
}

function renderCard(s, isDonated) {
  const card = document.createElement('div');
  card.className = 'card' + (isDonated ? ' donated' : '');
  const timesWorn = parseInt(s.timesWorn) || 0;
  card.innerHTML = `
    <div class="card-top">
      ${s.photo ? `<img class="thumb" src="${s.photo}">` : `<div class="thumb">👟</div>`}
      <div class="card-info">
        <div class="name">${escapeHtml(s.name)}</div>
        <div class="meta">${escapeHtml(s.brand || '')}${s.brand && s.size ? ' · ' : ''}${s.size ? 'Size ' + escapeHtml(s.size) : ''}</div>
        <div class="meta">${escapeHtml(s.color || '')}</div>
        ${s.price ? `<div class="meta">$${parseFloat(s.price).toFixed(2)}</div>` : ''}
      </div>
      <div class="card-actions">
        ${isDonated ? '' : `<button class="icon-btn" data-edit="${s.id}" aria-label="Edit">✏️</button>`}
        <button class="icon-btn" data-delete="${s.id}" aria-label="Delete">🗑️</button>
      </div>
    </div>
    <div class="card-wear">
      <span>Worn ${timesWorn}x</span>
      <div class="small-btn-row">
        ${isDonated
          ? `<button class="small-btn" data-restore="${s.id}">Restore</button>`
          : `<button class="wear-btn" data-wear="${s.id}" aria-label="Add a wear">+1 Wear</button>
             <button class="small-btn donate-btn" data-donate="${s.id}">Donate</button>`
        }
      </div>
    </div>
  `;
  return card;
}

function openSheet(shoe) {
  editingId = shoe ? shoe.id : null;
  document.getElementById('sheetTitle').textContent = shoe ? 'Edit Shoe' : 'Add Shoe';
  document.getElementById('fId').value = shoe ? shoe.id : '';
  document.getElementById('fName').value = shoe ? shoe.name : '';
  document.getElementById('fBrand').value = shoe ? shoe.brand || '' : '';
  document.getElementById('fSize').value = shoe ? shoe.size || '' : '';
  document.getElementById('fColor').value = shoe ? shoe.color || '' : '';
  document.getElementById('fTimesWorn').value = shoe ? shoe.timesWorn || 0 : 0;
  document.getElementById('fPrice').value = shoe && shoe.price ? shoe.price : '';
  fPhotoData.value = shoe && shoe.photo ? shoe.photo : '';
  updatePhotoPreview();
  backdrop.classList.add('open');
  sheet.classList.add('open');
}

function closeSheet() {
  backdrop.classList.remove('open');
  sheet.classList.remove('open');
  form.reset();
  editingId = null;
}

function updatePhotoPreview() {
  if (fPhotoData.value) {
    photoPreview.src = fPhotoData.value;
  } else {
    photoPreview.removeAttribute('src');
    photoPreview.textContent = '👟';
  }
}

function resizeImageFile(file, maxDim = 480, quality = 0.8) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = Math.round(height * (maxDim / width));
          width = maxDim;
        } else if (height > maxDim) {
          width = Math.round(width * (maxDim / height));
          height = maxDim;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

document.getElementById('addBtn').addEventListener('click', () => openSheet(null));
document.getElementById('cancelBtn').addEventListener('click', closeSheet);
backdrop.addEventListener('click', closeSheet);

document.getElementById('photoBtn').addEventListener('click', () => photoInput.click());
photoInput.addEventListener('change', async () => {
  const file = photoInput.files[0];
  if (!file) return;
  try {
    fPhotoData.value = await resizeImageFile(file);
    updatePhotoPreview();
  } catch {
    // ignore unreadable image
  }
});

form.addEventListener('submit', async e => {
  e.preventDefault();
  if (!currentUser) return;
  const data = {
    name: document.getElementById('fName').value.trim(),
    brand: document.getElementById('fBrand').value.trim(),
    size: document.getElementById('fSize').value.trim(),
    color: document.getElementById('fColor').value.trim(),
    timesWorn: Math.max(0, parseInt(document.getElementById('fTimesWorn').value) || 0),
    price: Math.max(0, parseFloat(document.getElementById('fPrice').value) || 0),
    photo: fPhotoData.value || null,
  };
  const shoesRef = collection(db, 'users', currentUser.uid, 'shoes');
  if (editingId) {
    await updateDoc(doc(shoesRef, editingId), data);
  } else {
    await addDoc(shoesRef, { ...data, status: 'active', createdAtMs: Date.now(), createdAt: serverTimestamp() });
  }
  closeSheet();
});

listEl.addEventListener('click', async e => {
  if (!currentUser) return;
  const editId = e.target.closest('[data-edit]')?.dataset.edit;
  const deleteId = e.target.closest('[data-delete]')?.dataset.delete;
  const wearId = e.target.closest('[data-wear]')?.dataset.wear;
  const donateId = e.target.closest('[data-donate]')?.dataset.donate;
  const restoreId = e.target.closest('[data-restore]')?.dataset.restore;
  const shoesRef = collection(db, 'users', currentUser.uid, 'shoes');

  if (editId) {
    openSheet(shoes.find(s => s.id === editId));
  } else if (deleteId) {
    if (confirm('Permanently delete this pair? This cannot be undone.')) {
      await deleteDoc(doc(shoesRef, deleteId));
    }
  } else if (wearId) {
    await updateDoc(doc(shoesRef, wearId), { timesWorn: increment(1) });
  } else if (donateId) {
    if (confirm('Move this pair to your donated archive? It stays saved, just out of your active collection.')) {
      await updateDoc(doc(shoesRef, donateId), { status: 'donated', donatedAt: serverTimestamp() });
    }
  } else if (restoreId) {
    await updateDoc(doc(shoesRef, restoreId), { status: 'active', donatedAt: null });
  }
});

searchEl.addEventListener('input', render);
sortSelect.addEventListener('change', render);
toggleDonatedBtn.addEventListener('click', () => {
  showDonated = !showDonated;
  render();
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
